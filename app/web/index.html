<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="1Deen - Protect your Salah and build consistent daily worship.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="1Deen">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>1Deen</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7fbff;
    }
    body.preload-dark {
      background: #10151b;
    }
    #preload {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background: radial-gradient(circle at top right, #eaf3ff 0%, #f7fbff 60%);
      transition: opacity 260ms ease;
    }
    body.preload-dark #preload {
      background: radial-gradient(circle at top right, #1b232e 0%, #10151b 60%);
    }
    #preload.hide {
      opacity: 0;
      pointer-events: none;
    }
    #preload .wrap {
      text-align: center;
      color: #121a25;
    }
    body.preload-dark #preload .wrap {
      color: #ffffff;
    }
    #preload .logo {
      width: 84px;
      height: 84px;
      border-radius: 20px;
      margin: 0 auto 16px auto;
      overflow: hidden;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
    }
    #preload .logo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    #preload .title {
      font-size: 46px;
      font-weight: 800;
      margin: 0;
      letter-spacing: 0.3px;
    }
    #preload .subtitle {
      margin: 4px 0 0 0;
      font-size: 15px;
      opacity: 0.75;
    }
  </style>
  <script>
    (function () {
      try {
        var mode = localStorage.getItem('flutter.settings.theme_mode') || localStorage.getItem('settings.theme_mode');
        if (mode === 'discipline') document.body.classList.add('preload-dark');
      } catch (e) {}
    })();
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('preload');
      if (!loader) return;
      loader.classList.add('hide');
      setTimeout(function () {
        loader.remove();
      }, 320);
    });
  </script>
</head>
<body>
  <div id="preload">
    <div class="wrap">
      <div class="logo"><img src="icons/Icon-192.png" alt="1Deen logo" /></div>
      <h1 class="title">1Deen</h1>
      <p class="subtitle">created by Sara & Isa</p>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
